# Bedrock Knowledge Base Configuration for MedFlow
# This is a template - actual deployment requires AWS Console or SDK

name: medflow-medical-literature
description: Medical literature and trial protocols for patient eligibility screening

embedding_model:
  model_id: amazon.titan-embed-text-v2
  dimensions: 1024

vector_store:
  type: opensearch_serverless
  collection_name: medflow-knowledge-base
  index_name: medflow-medical-literature-index
  vector_field: embedding
  text_field: content
  metadata_field: metadata

data_sources:
  - name: trial-protocols
    type: s3
    s3_configuration:
      bucket_name: medflow-trial-protocols
      inclusion_prefixes:
        - protocols/
      chunking_strategy:
        type: semantic
        max_tokens: 512
        overlap_tokens: 50
    sync_schedule: daily
    
  - name: medical-journals
    type: s3
    s3_configuration:
      bucket_name: medflow-medical-journals
      inclusion_prefixes:
        - journals/
        - literature/
      chunking_strategy:
        type: semantic
        max_tokens: 512
        overlap_tokens: 50
    sync_schedule: weekly

retrieval_configuration:
  top_k: 5
  similarity_threshold: 0.7
  search_type: hybrid  # semantic + keyword
  reranking:
    enabled: true
    model_id: amazon.rerank-v1

tags:
  Application: MedFlow
  Component: KnowledgeBase
  Environment: Demo
  DataType: MedicalLiterature
